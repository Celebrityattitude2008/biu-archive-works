<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BIU Student Hub — Past Questions</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />
  <script src="lazy-loader-init.js"></script>
  <style>
    :root {
      --primary: #3f19e6;
      --primary-light: #7c3aed;
      --bg-light: #f8f9fb;
      --card-bg-light: #ffffff;
      --text-light: #1a1f36;
      --text-muted-light: #717182;
      --border-light: rgba(0, 0, 0, 0.1);
      --bg-dark: #0f172a;
      --card-bg-dark: #1e293b;
      --text-dark: #f1f5f9;
      --text-muted-dark: #94a3b8;
      --border-dark: #334155;
      --bg: var(--bg-light);
      --card-bg: var(--card-bg-light);
      --text-main: var(--text-light);
      --text-muted: var(--text-muted-light);
      --border: var(--border-light);
    }
    [data-theme="dark"] { --bg: var(--bg-dark); --card-bg: var(--card-bg-dark); --text-main: var(--text-dark); --text-muted: var(--text-muted-dark); --border: var(--border-dark); }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text-main); transition: background-color 0.3s ease; display: flex; flex-direction: column; min-height: 100vh; padding-bottom: 80px; }
    .top-navbar { position: fixed; top: 0; left: 0; right: 0; height: 70px; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
    .navbar-brand { font-size: 20px; font-weight: 800; background: linear-gradient(135deg, #3f19e6, #0ea5e9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .navbar-actions { display: flex; gap: 12px; }
    .icon-btn { width: 40px; height: 40px; border-radius: 10px; border: none; background: rgba(255, 255, 255, 0.1); color: var(--text-main); cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .icon-btn:hover { background: rgba(255, 255, 255, 0.2); color: var(--primary); }
    .main-content { flex: 1; max-width: 900px; margin: 80px auto 0; width: 100%; padding: 20px; }
    .page-title { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
    .page-subtitle { font-size: 16px; color: var(--text-muted); }
    .glass-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 20px; padding: 24px; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12); margin-bottom: 20px; }
    .btn { padding: 12px 24px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn-primary { background: linear-gradient(135deg, #3f19e6, #0ea5e9); color: white; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(63, 25, 230, 0.3); }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 80px; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); border-top: 1px solid var(--border); display: grid; grid-template-columns: repeat(5, 1fr); align-items: center; z-index: 1000; }
    .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; color: var(--text-muted); text-decoration: none; font-size: 12px; font-weight: 500; }
    .nav-item:hover, .nav-item.active { color: var(--primary); }
    @media (max-width: 480px) { .page-title { font-size: 20px; } }
  </style>
</head>
<body>
  <div class="top-navbar">
    <div class="navbar-brand">BIU Hub</div>
    <div class="navbar-actions">
      <button class="icon-btn"><span class="material-symbols-rounded">notifications</span></button>
      <button class="icon-btn" id="theme-toggle"><span class="material-symbols-rounded">light_mode</span></button>
    </div>
  </div>
  <div class="main-content">
    <div class="page-header">
      <h1 class="page-title">Past Questions</h1>
      <p class="page-subtitle">Practice with past papers</p>
    </div>
    <div class="glass-card">
      <h2 style="font-weight: 600; margin-bottom: 16px;">Welcome</h2>
      <p style="color: var(--text-muted); margin-bottom: 20px;">This page is being updated with the new React-style design.</p>
      <button class="btn btn-primary">Get Started</button>
    </div>
  </div>
  <div class="bottom-nav">
    <a href="index.html" class="nav-item"><span class="material-symbols-rounded">home</span><span>Home</span></a>
    <a href="profile.html" class="nav-item"><span class="material-symbols-rounded">person</span><span>Profile</span></a>
    <a href="download.html" class="nav-item"><span class="material-symbols-rounded">download</span><span>Downloads</span></a>
    <a href="chatbot.html" class="nav-item"><span class="material-symbols-rounded">chat</span><span>Chat</span></a>
    <a href="subscriptions.html" class="nav-item"><span class="material-symbols-rounded">star</span><span>Premium</span></a>
  </div>
  <script src="lazy-loader-init.js"></script>
  <script>
    document.getElementById('theme-toggle').addEventListener('click', function() {
      document.documentElement.dataset.theme = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
      localStorage.setItem('theme', document.documentElement.dataset.theme);
      updateThemeIcon();
    });
    function updateThemeIcon() {
      const isDark = document.documentElement.dataset.theme === 'dark';
      const icon = document.getElementById('theme-toggle').querySelector('.material-symbols-rounded');
      icon.textContent = isDark ? 'dark_mode' : 'light_mode';
    }
    document.addEventListener('DOMContentLoaded', function() {
      const theme = localStorage.getItem('theme') || 'light';
      document.documentElement.dataset.theme = theme;
      updateThemeIcon();
    });
  </script>
</body>
</html>
