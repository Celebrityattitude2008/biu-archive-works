<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BIU Student Hub — Sign Up</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />
  <script src="lazy-loader-init.js"></script>

  <style>
    /* ============================================
       REACT-STYLE DESIGN SYSTEM - BLUE THEME
       ============================================ */

    :root {
      /* Blue Color Palette (React-inspired) */
      --primary: #3f19e6;
      --primary-dark: #3f19e6;
      --primary-light: #7c3aed;

      /* Secondary Colors */
      --secondary: #f8f9fb;
      --accent: #e9ebef;
      --accent-2: #ececf0;

      /* Light Theme */
      --bg-light: #f8f9fb;
      --card-bg-light: #ffffff;
      --text-light: #1a1f36;
      --text-muted-light: #717182;
      --border-light: rgba(0, 0, 0, 0.1);
      --icon-bg-light: #f8f9fb;
      --nav-bg-light: #ffffff;

      /* Dark Theme */
      --bg-dark: #0f172a;
      --card-bg-dark: #1e293b;
      --text-dark: #f1f5f9;
      --text-muted-dark: #94a3b8;
      --border-dark: #334155;
      --icon-bg-dark: #334155;
      --nav-bg-dark: #1e293b;

      /* Status Colors */
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --info: #0ea5e9;

      /* Shadows */
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
      --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.12);
      --shadow-xl: 0 12px 32px rgba(0, 0, 0, 0.15);
      --shadow-dark: 0 4px 12px rgba(0, 0, 0, 0.3);
      --shadow-lg-dark: 0 8px 24px rgba(0, 0, 0, 0.4);
      --shadow-xl-dark: 0 12px 32px rgba(0, 0, 0, 0.5);

      /* Border Radius */
      --radius-sm: 12px;
      --radius-md: 16px;
      --radius-lg: 24px;
      --radius-xl: 32px;

      /* Transitions */
      --transition-fast: 0.15s ease;
      --transition-base: 0.3s ease;
      --transition-slow: 0.5s ease;

      /* Apply light theme by default */
      --bg: var(--bg-light);
      --card-bg: var(--card-bg-light);
      --text-main: var(--text-light);
      --text-muted: var(--text-muted-light);
      --border: var(--border-light);
      --icon-bg: var(--icon-bg-light);
      --nav-bg: var(--nav-bg-light);
      --shadow-md: var(--shadow);
      --shadow-md-lg: var(--shadow-lg);
      --shadow-md-xl: var(--shadow-xl);
    }

    /* Dark theme for the entire document */
    [data-theme="dark"],
    html.dark,
    body.dark {
      --bg: var(--bg-dark);
      --card-bg: var(--card-bg-dark);
      --text-main: var(--text-dark);
      --text-muted: var(--text-muted-dark);
      --border: var(--border-dark);
      --icon-bg: var(--icon-bg-dark);
      --nav-bg: var(--nav-bg-dark);
      --shadow-md: var(--shadow-dark);
      --shadow-md-lg: var(--shadow-lg-dark);
      --shadow-md-xl: var(--shadow-xl-dark);
    }

    /* Universal reset and base styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      transition: background-color var(--transition-base), color var(--transition-base);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    /* ============================================
       ANIMATED BACKGROUND BLOBS (React-style)
       ============================================ */

    .animated-bg {
      position: fixed;
      inset: 0;
      z-index: -10;
      overflow: hidden;
    }

    .animated-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.7;
    }

    .blob-1 {
      top: 40px;
      left: 40px;
      width: 256px;
      height: 256px;
      background: linear-gradient(135deg, rgba(63, 25, 230, 0.2), rgba(14, 165, 233, 0.2));
      animation: float-blob-1 8s ease-in-out infinite;
    }

    .blob-2 {
      bottom: 80px;
      right: 80px;
      width: 384px;
      height: 384px;
      background: linear-gradient(135deg, rgba(124, 58, 237, 0.2), rgba(16, 185, 129, 0.2));
      animation: float-blob-2 12s ease-in-out infinite;
    }

    .blob-3 {
      top: 50%;
      left: 50%;
      width: 288px;
      height: 288px;
      background: linear-gradient(135deg, rgba(245, 158, 11, 0.15), rgba(239, 68, 68, 0.15));
      animation: float-blob-3 10s ease-in-out infinite;
    }

    @keyframes float-blob-1 {
      0%, 100% { transform: translate(0, 0); }
      25% { transform: translate(30px, 30px); }
      50% { transform: translate(0, 60px); }
      75% { transform: translate(-30px, 30px); }
    }

    @keyframes float-blob-2 {
      0%, 100% { transform: translate(0, 0); }
      25% { transform: translate(-30px, -40px); }
      50% { transform: translate(0, -80px); }
      75% { transform: translate(30px, -40px); }
    }

    @keyframes float-blob-3 {
      0%, 100% { transform: translate(-50%, -50%) translate(0, 0); }
      25% { transform: translate(-50%, -50%) translate(25px, -25px); }
      50% { transform: translate(-50%, -50%) translate(0, 25px); }
      75% { transform: translate(-50%, -50%) translate(-25px, -25px); }
    }

    /* ============================================
       AUTH FORM CONTAINER (React-style)
       ============================================ */

    .auth-container {
      width: 100%;
      max-width: 400px;
      margin: 0 auto;
    }

    .auth-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 8px 32px rgba(63, 25, 230, 0.15);
      transition: all var(--transition-base);
    }

    [data-theme="dark"] .auth-card {
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .auth-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 48px rgba(63, 25, 230, 0.2);
    }

    /* ============================================
       FORM ELEMENTS (React-style)
       ============================================ */

    .auth-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-title {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 8px;
    }

    .auth-subtitle {
      font-size: 16px;
      color: var(--text-muted);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-main);
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      color: var(--text-main);
      font-size: 16px;
      transition: all var(--transition-fast);
      outline: none;
    }

    [data-theme="dark"] .form-input {
      background: rgba(30, 41, 59, 0.6);
    }

    .form-input:focus {
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.2);
      box-shadow: 0 0 0 3px rgba(63, 25, 230, 0.1);
    }

    .form-input::placeholder {
      color: var(--text-muted);
    }

    /* ============================================
       BUTTONS (React-style)
       ============================================ */

    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition-base);
      position: relative;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #3f19e6, #0ea5e9);
      color: white;
      box-shadow: 0 4px 12px rgba(63, 25, 230, 0.2);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(63, 25, 230, 0.3);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      color: var(--text-main);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.2);
      border-color: var(--primary);
    }

    /* ============================================
       DIVIDER
       ============================================ */

    .divider {
      display: flex;
      align-items: center;
      margin: 24px 0;
      color: var(--text-muted);
      font-size: 14px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider::before {
      margin-right: 16px;
    }

    .divider::after {
      margin-left: 16px;
    }

    /* ============================================
       AUTH TOGGLE
       ============================================ */

    .auth-toggle {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: var(--text-muted);
    }

    .auth-link {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      transition: all var(--transition-fast);
    }

    .auth-link:hover {
      opacity: 0.8;
    }

    /* ============================================
       ANIMATIONS
       ============================================ */

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideInUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-fade-in {
      animation: fadeIn 0.6s ease-out forwards;
    }

    .animate-slide-up {
      animation: slideInUp 0.5s ease-out forwards;
    }

    /* ============================================
       RESPONSIVE DESIGN
       ============================================ */

    @media (max-width: 480px) {
      .auth-card {
        padding: 24px;
      }

      .auth-title {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <!-- Animated Background -->
  <div class="animated-bg">
    <div class="animated-blob blob-1"></div>
    <div class="animated-blob blob-2"></div>
    <div class="animated-blob blob-3"></div>
  </div>

  <!-- Auth Container -->
  <div class="auth-container">
    <div class="auth-card animate-fade-in">
      <!-- Signup Form -->
      <div id="signup-form">
        <div class="auth-header">
          <h1 class="auth-title">Join the Hub</h1>
          <p class="auth-subtitle">Start your digital journey at BIU</p>
        </div>

        <form id="signupForm">
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-input" id="regName" placeholder="John Doe" required>
          </div>

          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-input" id="regEmail" placeholder="you@students.biu.edu.ng" required>
          </div>

          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" class="form-input" id="regPass" placeholder="••••••••" required>
          </div>

          <div class="form-group">
            <label class="form-label">Level</label>
            <select class="form-input" id="regLevel">
              <option>100L</option>
              <option>200L</option>
              <option>300L</option>
              <option>400L</option>
            </select>
          </div>

          <button type="submit" class="btn btn-primary" id="regBtn">Create Account</button>
        </form>

        <div class="divider">OR</div>

        <button type="button" class="btn btn-secondary googleAuth">
          <span class="material-symbols-rounded" style="margin-right: 8px;">account_circle</span>
          Continue with Google
        </button>

        <div class="auth-toggle">
          Already have an account? <a href="login.html" class="auth-link">Sign In</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase Scripts -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <script>
    // Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyBsVbLw4mvFTJhmORUXCUNyGc98Rripj3M",
      authDomain: "biu-students-hub.firebaseapp.com",
      projectId: "biu-students-hub",
      databaseURL: "https://biu-students-hub-default-rtdb.firebaseio.com",
      appId: "1:128818531382:web:190dc5688d1b9d21321c97"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // Signup Logic
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('regBtn');

      if (!e.target.checkValidity()) {
        return;
      }

      btn.disabled = true;
      btn.textContent = "Creating Account...";

      try {
        const cred = await auth.createUserWithEmailAndPassword(
          document.getElementById('regEmail').value,
          document.getElementById('regPass').value
        );
        await db.ref('profiles/' + cred.user.uid).set({
          fullName: document.getElementById('regName').value,
          email: document.getElementById('regEmail').value,
          level: document.getElementById('regLevel').value,
          verified: false,
          createdAt: Date.now()
        });
        window.location.href = 'index.html';
      } catch (err) {
        alert(err.message);
        btn.disabled = false;
        btn.textContent = "Create Account";
      }
    });

    // Google Auth Logic
    async function googleSignIn() {
      const provider = new firebase.auth.GoogleAuthProvider();
      try {
        const result = await auth.signInWithPopup(provider);
        const user = result.user;
        const profileRef = db.ref('profiles/' + user.uid);
        const snap = await profileRef.once('value');

        if (!snap.exists()) {
          await profileRef.set({
            fullName: user.displayName || 'BIU Student',
            email: user.email,
            level: '100L',
            verified: false,
            createdAt: Date.now()
          });
        }
        window.location.href = 'index.html';
      } catch (err) {
        alert(err.message);
      }
    }

    document.querySelectorAll('.googleAuth').forEach(btn => {
      btn.addEventListener('click', googleSignIn);
    });

    // Theme initialization
    document.addEventListener('DOMContentLoaded', function() {
      initializeThemeTransitions();
      updateThemeIcon();
    });
  </script>
</body>
</html>
