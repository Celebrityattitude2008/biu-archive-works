<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BIU Student Hub — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />
  <script src="lazy-loader-init.js"></script>
  <style>
    :root {
      --primary: #3f19e6;
      --primary-dark: #3f19e6;
      --primary-light: #7c3aed;
      --accent: #e9ebef;
      --bg-light: #f8f9fb;
      --card-bg-light: #ffffff;
      --text-light: #1a1f36;
      --text-muted-light: #717182;
      --border-light: rgba(0, 0, 0, 0.1);
      --bg-dark: #0f172a;
      --card-bg-dark: #1e293b;
      --text-dark: #f1f5f9;
      --text-muted-dark: #94a3b8;
      --border-dark: #334155;
      --bg: var(--bg-light);
      --card-bg: var(--card-bg-light);
      --text-main: var(--text-light);
      --text-muted: var(--text-muted-light);
      --border: var(--border-light);
      --transition-base: 0.3s ease;
      --transition-fast: 0.15s ease;
    }

    [data-theme="dark"], html.dark, body.dark {
      --bg: var(--bg-dark);
      --card-bg: var(--card-bg-dark);
      --text-main: var(--text-dark);
      --text-muted: var(--text-muted-dark);
      --border: var(--border-dark);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      transition: background-color var(--transition-base), color var(--transition-base);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .animated-bg {
      position: fixed;
      inset: 0;
      z-index: -10;
      overflow: hidden;
    }

    .animated-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.7;
    }

    .blob-1 { top: 40px; left: 40px; width: 256px; height: 256px; background: linear-gradient(135deg, rgba(63, 25, 230, 0.2), rgba(14, 165, 233, 0.2)); animation: float-blob-1 8s ease-in-out infinite; }
    .blob-2 { bottom: 80px; right: 80px; width: 384px; height: 384px; background: linear-gradient(135deg, rgba(124, 58, 237, 0.2), rgba(16, 185, 129, 0.2)); animation: float-blob-2 12s ease-in-out infinite; }
    .blob-3 { top: 50%; left: 50%; width: 288px; height: 288px; background: linear-gradient(135deg, rgba(245, 158, 11, 0.15), rgba(239, 68, 68, 0.15)); animation: float-blob-3 10s ease-in-out infinite; }

    @keyframes float-blob-1 { 0%, 100% { transform: translate(0, 0); } 25% { transform: translate(30px, 30px); } 50% { transform: translate(0, 60px); } 75% { transform: translate(-30px, 30px); } }
    @keyframes float-blob-2 { 0%, 100% { transform: translate(0, 0); } 25% { transform: translate(-30px, -40px); } 50% { transform: translate(0, -80px); } 75% { transform: translate(30px, -40px); } }
    @keyframes float-blob-3 { 0%, 100% { transform: translate(-50%, -50%) translate(0, 0); } 25% { transform: translate(-50%, -50%) translate(25px, -25px); } 50% { transform: translate(-50%, -50%) translate(0, 25px); } 75% { transform: translate(-50%, -50%) translate(-25px, -25px); } }

    .auth-container { width: 100%; max-width: 400px; margin: 0 auto; }
    .auth-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 24px; padding: 32px; box-shadow: 0 8px 32px rgba(63, 25, 230, 0.15); transition: all var(--transition-base); }
    [data-theme="dark"] .auth-card { background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); }
    .auth-card:hover { transform: translateY(-4px); box-shadow: 0 12px 48px rgba(63, 25, 230, 0.2); }

    .auth-header { text-align: center; margin-bottom: 32px; }
    .auth-title { font-size: 28px; font-weight: 700; color: var(--text-main); margin-bottom: 8px; }
    .auth-subtitle { font-size: 16px; color: var(--text-muted); }

    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-size: 14px; font-weight: 600; color: var(--text-main); margin-bottom: 8px; }
    .form-input { width: 100%; padding: 16px; border: 1px solid var(--border); border-radius: 12px; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); color: var(--text-main); font-size: 16px; transition: all var(--transition-fast); outline: none; }
    [data-theme="dark"] .form-input { background: rgba(30, 41, 59, 0.6); }
    .form-input:focus { border-color: var(--primary); background: rgba(255, 255, 255, 0.2); box-shadow: 0 0 0 3px rgba(63, 25, 230, 0.1); }
    .form-input::placeholder { color: var(--text-muted); }

    .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all var(--transition-base); margin-bottom: 16px; }
    .btn-primary { background: linear-gradient(135deg, #3f19e6, #0ea5e9); color: white; box-shadow: 0 4px 12px rgba(63, 25, 230, 0.2); }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(63, 25, 230, 0.3); }
    .btn-primary:active { transform: translateY(0); }
    .btn-secondary { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid var(--border); color: var(--text-main); }
    .btn-secondary:hover { background: rgba(255, 255, 255, 0.2); border-color: var(--primary); }

    .divider { display: flex; align-items: center; margin: 24px 0; color: var(--text-muted); font-size: 14px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .divider::before { margin-right: 16px; }
    .divider::after { margin-left: 16px; }

    .auth-toggle { text-align: center; margin-top: 24px; font-size: 14px; color: var(--text-muted); }
    .auth-link { color: var(--primary); text-decoration: none; font-weight: 600; transition: all var(--transition-fast); }
    .auth-link:hover { opacity: 0.8; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.6s ease-out forwards; }

    @media (max-width: 480px) { .auth-card { padding: 24px; } .auth-title { font-size: 24px; } }
  </style>
</head>
<body>
  <div class="animated-bg">
    <div class="animated-blob blob-1"></div>
    <div class="animated-blob blob-2"></div>
    <div class="animated-blob blob-3"></div>
  </div>
  <div class="auth-container">
    <div class="auth-card animate-fade-in">
      <div id="login-form">
        <div class="auth-header">
          <h1 class="auth-title">Welcome Back</h1>
          <p class="auth-subtitle">Sign in to your BIU Student Hub account</p>
        </div>
        <form id="loginForm">
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-input" id="logEmail" placeholder="you@students.biu.edu.ng" required>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" class="form-input" id="logPass" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-primary" id="logBtn">Sign In</button>
        </form>
        <div class="divider">OR</div>
        <button type="button" class="btn btn-secondary googleAuth">
          <span class="material-symbols-rounded" style="margin-right: 8px;">account_circle</span>
          Continue with Google
        </button>
        <div class="auth-toggle">
          New student? <a href="sign.html" id="toSignup" class="auth-link">Create Account</a>
        </div>
      </div>
    </div>
  </div>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBsVbLw4mvFTJhmORUXCUNyGc98Rripj3M",
      authDomain: "biu-students-hub.firebaseapp.com",
      projectId: "biu-students-hub",
      databaseURL: "https://biu-students-hub-default-rtdb.firebaseio.com",
      appId: "1:128818531382:web:190dc5688d1b9d21321c97"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('logBtn');
      if (!e.target.checkValidity()) return;
      btn.disabled = true;
      btn.textContent = "Signing In...";
      try {
        await auth.signInWithEmailAndPassword(document.getElementById('logEmail').value, document.getElementById('logPass').value);
        window.location.href = 'index.html';
      } catch (err) {
        alert(err.message);
        btn.disabled = false;
        btn.textContent = "Sign In";
      }
    });
    document.querySelectorAll('.googleAuth').forEach(btn => {
      btn.addEventListener('click', async () => {
        const provider = new firebase.auth.GoogleAuthProvider();
        try {
          const result = await auth.signInWithPopup(provider);
          const user = result.user;
          const profileRef = db.ref('profiles/' + user.uid);
          const snap = await profileRef.once('value');
          if (!snap.exists()) {
            await profileRef.set({
              fullName: user.displayName || 'BIU Student',
              email: user.email,
              level: '100L',
              verified: false,
              createdAt: Date.now()
            });
          }
          window.location.href = 'index.html';
        } catch (err) {
          alert(err.message);
        }
      });
    });
    document.addEventListener('DOMContentLoaded', function() {
      initializeThemeTransitions();
      updateThemeIcon();
    });
  </script>
</body>
</html>
