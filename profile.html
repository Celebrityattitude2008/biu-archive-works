<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BIU Student Hub — My Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />
  <script src="lazy-loader-init.js"></script>

  <style>
    /* ============================================
       REACT-STYLE DESIGN SYSTEM - BLUE THEME
       ============================================ */

    :root {
      /* Blue Color Palette */
      --primary: #3f19e6;
      --primary-light: #7c3aed;
      --secondary: #f8f9fb;
      --accent: #e9ebef;
      
      /* Light Theme */
      --bg-light: #f8f9fb;
      --card-bg-light: #ffffff;
      --text-light: #1a1f36;
      --text-muted-light: #717182;
      --border-light: rgba(0, 0, 0, 0.1);
      
      /* Dark Theme */
      --bg-dark: #0f172a;
      --card-bg-dark: #1e293b;
      --text-dark: #f1f5f9;
      --text-muted-dark: #94a3b8;
      --border-dark: #334155;
      
      /* Shadows & Transitions */
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
      --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.12);
      --transition-base: 0.3s ease;
      --transition-fast: 0.15s ease;
      
      /* Apply light theme by default */
      --bg: var(--bg-light);
      --card-bg: var(--card-bg-light);
      --text-main: var(--text-light);
      --text-muted: var(--text-muted-light);
      --border: var(--border-light);
    }

    [data-theme="dark"],
    html.dark,
    body.dark {
      --bg: var(--bg-dark);
      --card-bg: var(--card-bg-dark);
      --text-main: var(--text-dark);
      --text-muted: var(--text-muted-dark);
      --border: var(--border-dark);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      transition: background-color var(--transition-base);
      line-height: 1.6;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding-bottom: 80px;
    }

    /* ============================================
       TOP NAVIGATION (React-style)
       ============================================ */

    .top-navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 70px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    .navbar-brand {
      font-size: 20px;
      font-weight: 800;
      background: linear-gradient(135deg, #3f19e6, #0ea5e9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .navbar-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      border: none;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      color: var(--text-main);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition-fast);
      font-size: 20px;
    }

    .icon-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      color: var(--primary);
    }

    /* ============================================
       MAIN CONTENT
       ============================================ */

    .main-content {
      flex: 1;
      max-width: 900px;
      margin: 80px auto 0;
      width: 100%;
      padding: 20px;
    }

    .page-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .page-title {
      font-size: 32px;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 8px;
    }

    .page-subtitle {
      font-size: 16px;
      color: var(--text-muted);
    }

    /* ============================================
       GLASS CARDS (React-style)
       ============================================ */

    .glass-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      padding: 24px;
      box-shadow: var(--shadow-lg);
      transition: all var(--transition-base);
      margin-bottom: 20px;
    }

    .glass-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(63, 25, 230, 0.15);
      border-color: rgba(255, 255, 255, 0.3);
    }

    /* ============================================
       PROFILE SECTION
       ============================================ */

    .profile-section {
      text-align: center;
      margin-bottom: 40px;
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3f19e6, #0ea5e9);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: 800;
      color: white;
      margin: 0 auto 16px;
      box-shadow: 0 8px 24px rgba(63, 25, 230, 0.3);
    }

    .profile-name {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 4px;
    }

    .profile-email {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    /* ============================================
       INFO GRID
       ============================================ */

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .info-item {
      background: rgba(63, 25, 230, 0.05);
      border-radius: 16px;
      padding: 16px;
      text-align: center;
    }

    .info-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .info-value {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-main);
    }

    /* ============================================
       BUTTONS
       ============================================ */

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .btn-primary {
      background: linear-gradient(135deg, #3f19e6, #0ea5e9);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(63, 25, 230, 0.3);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid var(--border);
      color: var(--text-main);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .btn-group {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      justify-content: center;
    }

    /* ============================================
       BOTTOM NAVIGATION (Mobile-style)
       ============================================ */

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      align-items: center;
      padding-bottom: 10px;
      z-index: 1000;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      color: var(--text-muted);
      text-decoration: none;
      cursor: pointer;
      transition: all var(--transition-fast);
      font-size: 12px;
      font-weight: 500;
    }

    .nav-item:hover,
    .nav-item.active {
      color: var(--primary);
    }

    .nav-icon {
      font-size: 24px;
    }

    /* ============================================
       RESPONSIVE DESIGN
       ============================================ */

    @media (max-width: 768px) {
      .page-title {
        font-size: 24px;
      }

      .info-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .glass-card {
        padding: 16px;
      }
    }

    @media (max-width: 480px) {
      .navbar-brand {
        font-size: 16px;
      }

      .page-title {
        font-size: 20px;
      }

      .info-grid {
        grid-template-columns: 1fr;
      }

      .btn-group {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <!-- Top Navigation -->
  <div class="top-navbar">
    <div class="navbar-brand">BIU Hub</div>
    <div class="navbar-actions">
      <button class="icon-btn">
        <span class="material-symbols-rounded">notifications</span>
      </button>
      <button class="icon-btn" id="theme-toggle">
        <span class="material-symbols-rounded">light_mode</span>
      </button>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <div class="page-header">
      <h1 class="page-title">My Profile</h1>
      <p class="page-subtitle">View and manage your account details</p>
    </div>

    <!-- Profile Section -->
    <div class="glass-card">
      <div class="profile-section">
        <div class="avatar">JD</div>
        <h2 class="profile-name">John Doe</h2>
        <p class="profile-email">john@students.biu.edu.ng</p>

        <div class="info-grid">
          <div class="info-item">
            <div class="info-label">Level</div>
            <div class="info-value">200L</div>
          </div>
          <div class="info-item">
            <div class="info-label">Status</div>
            <div class="info-value">Active</div>
          </div>
          <div class="info-item">
            <div class="info-label">CGPA</div>
            <div class="info-value">3.8</div>
          </div>
        </div>

        <div class="btn-group">
          <button class="btn btn-primary">Edit Profile</button>
          <button class="btn btn-secondary">Change Password</button>
        </div>
      </div>
    </div>

    <!-- Additional Info -->
    <div class="glass-card">
      <h3 style="font-weight: 600; margin-bottom: 16px; color: var(--text-main);">Account Settings</h3>
      <div style="display: flex; flex-direction: column; gap: 12px;">
        <div style="display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border);">
          <span>Email Notifications</span>
          <input type="checkbox" checked style="width: 20px; height: 20px;">
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border);">
          <span>Push Notifications</span>
          <input type="checkbox" checked style="width: 20px; height: 20px;">
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center; padding: 12px 0;">
          <span>Two-Factor Authentication</span>
          <input type="checkbox" style="width: 20px; height: 20px;">
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <div class="bottom-nav">
    <a href="index.html" class="nav-item">
      <span class="nav-icon material-symbols-rounded">home</span>
      <span>Home</span>
    </a>
    <a href="profile.html" class="nav-item active">
      <span class="nav-icon material-symbols-rounded">person</span>
      <span>Profile</span>
    </a>
    <a href="download.html" class="nav-item">
      <span class="nav-icon material-symbols-rounded">download</span>
      <span>Downloads</span>
    </a>
    <a href="chatbot.html" class="nav-item">
      <span class="nav-icon material-symbols-rounded">chat</span>
      <span>Chat</span>
    </a>
    <a href="subscriptions.html" class="nav-item">
      <span class="nav-icon material-symbols-rounded">star</span>
      <span>Premium</span>
    </a>
  </div>

  <script src="lazy-loader-init.js"></script>
  <script>
    // Theme Toggle
    document.getElementById('theme-toggle').addEventListener('click', function() {
      document.documentElement.dataset.theme = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
      localStorage.setItem('theme', document.documentElement.dataset.theme);
      updateThemeIcon();
    });

    function updateThemeIcon() {
      const isDark = document.documentElement.dataset.theme === 'dark';
      const icon = document.getElementById('theme-toggle').querySelector('.material-symbols-rounded');
      icon.textContent = isDark ? 'dark_mode' : 'light_mode';
    }

    // Load theme from storage
    document.addEventListener('DOMContentLoaded', function() {
      const theme = localStorage.getItem('theme') || 'light';
      document.documentElement.dataset.theme = theme;
      updateThemeIcon();
    });
  </script>
</body>
</html>
